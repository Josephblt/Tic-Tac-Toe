<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ruby WASM Tic-Tac-Toe - Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
    <style>
      html,
      body {
        height: 100%;
        width: 100%;
        margin: 0;
        background: #111;
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
        position: fixed;
        inset: 0;
        touch-action: none;
      }

      #app {
        display: grid;
        gap: 12px;
        justify-items: center;
        width: 100vw;
        height: 100%;
        max-width: 100vw;
        padding: 12px;
        box-sizing: border-box;
        overflow: hidden;
      }

      #terminal {
        display: grid;
        place-items: center;
        max-width: 100%;
        overflow: hidden;
        width: 100%;
        height: min(420px, calc(100vh - 244px));
      }

      #terminal .xterm,
      #terminal .xterm-screen,
      #terminal .xterm-viewport {
        max-width: 100% !important;
        overflow: hidden !important;
      }

      #controls {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 44px) 14px 44px;
      }

      #controls button {
        appearance: none;
        background: #222;
        border: 1px solid #555;
        color: #f2f2f2;
        font: 700 18px "Noto Sans Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        min-width: 0;
        touch-action: manipulation;
      }

      #controls button:active {
        background: #444;
      }

      #control-up {
        grid-column: 2;
      }

      #control-left {
        grid-column: 1;
        grid-row: 2;
      }

      #control-action {
        grid-column: 2;
        grid-row: 2;
      }

      #control-right {
        grid-column: 3;
        grid-row: 2;
      }

      #control-back {
        grid-column: 2;
        grid-row: 5;
      }

      #control-down {
        grid-column: 2;
        grid-row: 3;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="terminal"></div>
      <div id="controls" aria-label="Game controls">
        <button id="control-up" type="button" data-input="up" aria-label="Up">▲</button>
        <button id="control-left" type="button" data-input="left" aria-label="Left">◀</button>
        <button id="control-action" type="button" data-input="action" aria-label="Accept">↵</button>
        <button id="control-right" type="button" data-input="right" aria-label="Right">▶</button>
        <button id="control-back" type="button" data-input="back" aria-label="Back">⌫</button>
        <button id="control-down" type="button" data-input="down" aria-label="Down">▼</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script type="module">
      import { startBrowserGame } from "./browser_boot.js";

      await startBrowserGame({
        waitForFonts: true,
        terminal: {
          fontFamily: "'Noto Sans Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
          fontSize: 13
        },
        configureInput({ keyQueue }) {
          const touchKeys = {
            action: "\r",
            back: "\u007F",
            down: "down",
            left: "left",
            right: "right",
            up: "up"
          };

          document.querySelectorAll("#controls button").forEach((button) => {
            button.addEventListener("pointerdown", (event) => {
              event.preventDefault();
              keyQueue.push(touchKeys[button.dataset.input]);
            });
          });
        }
      });
    </script>
  </body>
</html>
