<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ruby WASM Tic-Tac-Toe</title>
    <script>
      const isTouchDevice = window.matchMedia("(pointer: coarse)").matches || navigator.maxTouchPoints > 0;
      window.location.replace(isTouchDevice ? "./mobile_index.html" : "./pc_index.html");
    </script>
  </head>
  <body>
    <noscript>
      <a href="./pc_index.html">PC</a>
      <a href="./mobile_index.html">Mobile</a>
    </noscript>
  </body>
</html>
