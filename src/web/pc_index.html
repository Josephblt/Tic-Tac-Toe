<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ruby WASM Tic-Tac-Toe - PC</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #111;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      #app {
        display: grid;
        gap: 12px;
        justify-items: center;
        width: min(760px, 100vw);
      }

      #terminal {
        display: grid;
        place-items: center;
        width: 100%;
        height: min(420px, 100vh);
      }

      #terminal .xterm-viewport {
        overflow-y: hidden !important;
      }

    </style>
  </head>
  <body>
    <div id="app">
      <div id="terminal"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script type="module">
      import { startWebGame } from "./web_boot.js";

      await startWebGame({
        focus: true,
        terminal: {
          fontFamily: "ui-monospace, SFMono-Regular, Menlo, Consolas, monospace",
          fontSize: 16
        },
        configureInput({ keyQueue, term }) {
          term.onKey(({ domEvent }) => {
            const keys = {
              ArrowLeft: "left",
              ArrowRight: "right",
              ArrowDown: "down",
              ArrowUp: "up",
              Enter: "\r",
              Backspace: "\u007F"
            };

            const key = keys[domEvent.code];
            if (key) {
              keyQueue.push(key);
              domEvent.preventDefault();
            }
          });
        }
      });
    </script>
  </body>
</html>
