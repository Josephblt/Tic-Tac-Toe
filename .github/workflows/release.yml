name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec

      - name: Package static web bundle
        run: bundle exec rake web:package

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/tic-tac-toe-web.zip
          --title "$GITHUB_REF_NAME"
          --notes "Static web build for $GITHUB_REF_NAME."
