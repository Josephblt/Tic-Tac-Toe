name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish, for example v0.1.1'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Run specs
        run: bundle exec rspec

      - name: Package static web bundle
        run: bundle exec rake web:package

      - name: Name release asset
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: mv dist/tic-tac-toe-web.zip "dist/tic-tac-toe-web-${TAG_NAME}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "dist/tic-tac-toe-web-${TAG_NAME}.zip" --clobber
          else
            gh release create "$TAG_NAME" \
              "dist/tic-tac-toe-web-${TAG_NAME}.zip" \
              --title "$TAG_NAME" \
              --notes "Static web build for $TAG_NAME."
          fi

      - name: Install butler
        run: |
          curl -fsSL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/butler
          butler -V

      - name: Upload web build to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_API_KEY }}
          ITCH_TARGET: josephblt-games/tic-tac-toe:web
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: butler push dist/web "$ITCH_TARGET" --userversion "$TAG_NAME"
